<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" rx="10" ry="10" fill="#1E1E1E" stroke="#444444" stroke-width="2"></rect>
  
  <path d="M 0,10 Q 0,0 10,0 L 790,0 Q 800,0 800,10 L 800,30 L 0,30 Z" fill="#333333"></path>
  <circle cx="20" cy="15" r="5" fill="#FF5F56"></circle>
  <circle cx="40" cy="15" r="5" fill="#FFBD2E"></circle>
  <circle cx="60" cy="15" r="5" fill="#27C93F"></circle>
  <text x="400" y="20" font-family="monospace" font-size="12" fill="#AAAAAA" text-anchor="middle">loop - terminal - 80x24</text>

  <g font-family="monospace" font-size="14" fill="#D4D4D4">
    <text x="30" y="60" font-weight="bold" fill="#00BCD4">Loop 3/7</text>
    <text x="120" y="60" fill="#BBBBBB">Day 2/5</text>
    <text x="200" y="60" fill="#FFB300">AFTERNOON</text>
    <text x="770" y="60" text-anchor="end" fill="#BBBBBB">Actions: 12</text>
    <line x1="30" y1="75" x2="770" y2="75" stroke="#444444" stroke-width="1"></line>

    <rect x="30" y="90" width="740" height="150" fill="#252525" stroke="#00BCD4" stroke-width="1" rx="5" ry="5"></rect>
    <text x="50" y="115" font-weight="bold" fill="#00BCD4">THE MAIN LODGE</text>
    <text x="50" y="145" fill="#999999">The main building smells like pine cleaner and burned</text>
    <text x="50" y="165" fill="#999999">coffee. A few campers are playing cards at the long</text>
    <text x="50" y="185" fill="#999999">tables. Through the window, you can see the lake.</text>
    
    <text x="50" y="215" font-weight="bold">People here:</text>
    <text x="50" y="235">  - Counselor Dave</text>
    <text x="180" y="235">  - Maya</text>

    <text x="30" y="270" font-weight="bold" fill="#888888">-- People ----------</text>
    <text x="30" y="295" fill="#FFFFFF"> 1. Talk to Counselor Dave</text>
    <text x="30" y="315" fill="#FFFFFF"> 2. Talk to Maya</text>
    
    <text x="30" y="345" font-weight="bold" fill="#888888">-- Explore ---------</text>
    <text x="30" y="370" fill="#FFFFFF"> 3. Observe</text>
    <text x="30" y="390" fill="#FFFFFF"> 4. Search (costs time)</text>
    <text x="30" y="410" fill="#FFFFFF"> 5. Travel to another location</text>

    <text x="30" y="460" fill="#00BCD4">Choose action: </text>
    <rect x="155" y="448" width="10" height="18" fill="#00BCD4"></rect>
  </g>
</svg>
